<!DOCTYPE html>
<html lang="fr"><head>
  <meta charset="UTF-8">

<body>
<header>
  <img src="logo-gpso.png" alt="Logo GPSO">
  <h1>INTERVENTION SOUS ASTREINTE</h1>

<!-- Correction 2 : id="rapport" pour rattacher les boutons externes -->
<form id="rapport">

  <label for="agentAstreinte">Agent d'astreinte</label>

  <label for="objet">Objet de l'intervention</label>

  <label for="nature">Nature de l'intervention</label>

    🎤 Dicter

    <button type="button" class="btn-gallery" onclick="document.getElementById('photoGallery').click()">
      🖼️ Choisir depuis la galerie
    </button>

<!-- Correction 2 : form="rapport" sur tous les boutons externes -->
<button type="button" form="rapport" onclick="sendMail()">✉️ Envoyer par mail</button>

<div id="currentDraftStatus" style="display:none; background:#e8f4e8; border:1px solid #4caf50; padding:8px 12px; margin:8px 0; border-radius:4px; font-size:0.9em; color:#2e7d32;"></div>

<button type="button" form="rapport" onclick="resetForm()">🆕 Nouvelle intervention</button>
<button type="button" form="rapport" onclick="saveDraft()">💾 Sauvegarder</button>
<button type="button" form="rapport" onclick="loadDraft()">📂 Charger</button>
<button type="button" form="rapport" onclick="deleteDraft()">🗑️ Supprimer une sauvegarde</button>
<button type="button" form="rapport" onclick="exportDirect()">📤 Exporter une sauvegarde</button>
<button type="button" form="rapport" onclick="exportDraftByMail()">
  📤✉️ Exporter et préparer un mail
</button>
<button type="button" form="rapport" onclick="importDraft()">📥 Importer une sauvegarde</button>

<input type="file" id="importFile" accept="application/json" style="display:none">

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- EXIF -->
<script src="https://unpkg.com/exifr/dist/full.umd.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
function v(id) { return document.getElementById(id).value; }

let photos = [];
let currentDraftId = null;
const DB_NAME = 'AstreintDB';
const STORE_NAME = 'drafts';

function updateStatusBar() {
  const bar = document.getElementById('currentDraftStatus');
  if (!bar) return;
  if (currentDraftId) {
    bar.textContent = '📋 Brouillon actif : ' + currentDraftId;
    bar.style.display = 'block';
  } else {
    bar.textContent = '';
    bar.style.display = 'none';
  }
}

function resetForm() {
  if (!confirm('Commencer une nouvelle intervention ? Le formulaire sera réinitialisé.')) return;
  ['adresse', 'agentAstreinte', 'date', 'heureDebut', 'origine', 'heureFin', 'objet', 'nature', 'autres'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const selectVille = document.getElementById('ville');
  if (selectVille) {
    const existing = selectVille.querySelector('option[data-auto]');
    if (existing) existing.remove();
    selectVille.selectedIndex = 0;
  }
  photos.forEach(p => { if (p.dataUrl && p.dataUrl.startsWith('blob:')) URL.revokeObjectURL(p.dataUrl); });
  photos = [];
  renderPreview();
  currentDraftId = null;
  updateStatusBar();
}

// ──────────────────────────────────────────────────────────────────
// ✅ INDEXEDDB - INITIALISATION
// ──────────────────────────────────────────────────────────────────

function initIndexedDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onerror = () => { console.error('IndexedDB initialization failed'); reject(request.error); };
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    request.onsuccess = () => { resolve(request.result); };
  });
}

function getDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onerror = () => reject(request.error);
    request.onsuccess = () => resolve(request.result);
  });
}

// ──────────────────────────────────────────────────────────────────
// ✅ COMPRESSION D'IMAGES
// ──────────────────────────────────────────────────────────────────

async function compressImage(file) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      let width = img.width;
      let height = img.height;
      const maxWidth = 1920;
      const maxHeight = 1440;
      if (width > height) {
        if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
      } else {
        if (height > maxHeight) { width = Math.round(width * maxHeight / height); height = maxHeight; }
      }
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      }, 'image/jpeg', 0.75);
    };
    img.onerror = () => resolve(null);
    img.src = URL.createObjectURL(file);
  });
}

// ── Carte ──────────────────────────────────────────────────────────
const map = L.map('map').setView([48.82, 2.27], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker = L.marker([48.82, 2.27], { draggable: true }).addTo(map);

marker.on('dragend', function () { reverse(marker.getLatLng()); });

function geoLocate() {
  if (!navigator.geolocation) { alert("La géolocalisation n'est pas supportée par ce navigateur."); return; }
  const options = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
  navigator.geolocation.getCurrentPosition(
    function (p) {
      const ll = [p.coords.latitude, p.coords.longitude];
      map.setView(ll, 18);
      marker.setLatLng(ll);
      reverse({ lat: ll[0], lng: ll[1] });
    },
    function (err) {
      const messages = {
        1: "Accès à la localisation refusé. Veuillez autoriser la géolocalisation dans les paramètres de votre navigateur.",
        2: "Position introuvable. Vérifiez que le GPS est activé sur votre téléphone.",
        3: "La demande de localisation a expiré (15 s). Vérifiez que le GPS est activé et réessayez."
      };
      alert(messages[err.code] || "Erreur de géolocalisation (code " + err.code + ") : " + err.message);
    },
    options
  );
}

function reverse(ll) {
  fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=' + ll.lat + '&lon=' + ll.lng)
    .then(r => r.json())
    .then(d => {
      if (!d.address) return;
      const a = d.address;
      const numero = a.house_number || '';
      const voie = a.road || '';
      const codePostal = a.postcode || '';
      const villeDetectee = a.city || a.town || a.village || '';
      let adresse = '';
      if (numero || voie) { adresse += `${numero} ${voie}`.trim(); }
      if (codePostal || villeDetectee) {
        const localite = [codePostal, villeDetectee].filter(Boolean).join(' ');
        adresse = adresse ? `${adresse}, ${localite}` : localite;
      }
      document.getElementById('adresse').value = adresse;
      syncCityField();
    });
}

// ── Photos ─────────────────────────────────────────────────────────

async function savePhotoToGallery(file) {
  try {
    const fileName = `photo_astreinte_${Date.now()}.jpg`;
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });
    const link = document.createElement('a');
    link.href     = base64;
    link.download = fileName;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (e) { console.error('Erreur savePhotoToGallery :', e); }
}

async function handleFile(file, fromCamera = false) {
  return new Promise(async function (resolve) {
    const objectUrl = URL.createObjectURL(file);
    let timestamp = null;
    let lat = null;
    let lng = null;
    try {
      const exif = await exifr.parse(file, { gps: true });
      if (exif) {
        timestamp = exif.DateTimeOriginal || exif.CreateDate || null;
        if (exif.latitude != null) { lat = exif.latitude; lng = exif.longitude; }
      }
    } catch (e) { console.warn("EXIF non lisible", e); }
    if (!timestamp) timestamp = new Date();
    const compressedBase64 = await compressImage(file);
    photos.push({ dataUrl: objectUrl, base64Compressed: compressedBase64, timestamp: timestamp, lat: lat, lng: lng, file: file });
    renderPreview();
    if (fromCamera) { await savePhotoToGallery(file); }
    resolve();
  });
}

async function handleFiles(files, fromCamera = false) {
  for (let i = 0; i < files.length; i++) { await handleFile(files[i], fromCamera); }
}

document.getElementById('photoCamera').addEventListener('change', async function (e) {
  await handleFiles(e.target.files, true); e.target.value = '';
});
document.getElementById('photoGallery').addEventListener('change', async function (e) {
  await handleFiles(e.target.files, false); e.target.value = '';
});

function deletePhoto(index) {
  URL.revokeObjectURL(photos[index].dataUrl);
  photos.splice(index, 1);
  renderPreview();
}

function formatDate(d) {
  if (!d) return 'Date inconnue';
  return new Intl.DateTimeFormat('fr-FR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  }).format(d instanceof Date ? d : new Date(d));
}

function formatDateForPDF(dateStr) {
  if (!dateStr) return 'Date inconnue';
  const [year, month, day] = dateStr.split('-');
  return `${day} - ${month} - ${year}`;
}

// ──────────────────────────────────────────────────────────────────
// ✅ GÉNÉRATION DU NOM DE FICHIER — Règle : VILLE_JJ-MM-AA_hh-mm
// ──────────────────────────────────────────────────────────────────

// ──────────────────────────────────────────────────────────────────
// ✅ GÉNÉRATION DU NOM DE FICHIER — Règle : VILLE_Objet_JJ-MM-AA
// ──────────────────────────────────────────────────────────────────
function generateFileName(fileExtension = 'pdf') {
  const sanitize = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-zA-Z0-9._-]/g, '-').replace(/-{2,}/g, '-').replace(/^-|-$/g, '');
  const ville = sanitize(getVille() || 'VILLE');
  const objet = sanitize((v('objet') || 'OBJET').trim());

  const dateInput = v('date');
  let formattedDate = 'JJ-MM-AA';
  if (dateInput) {
    const [year, month, day] = dateInput.split('-');
    formattedDate = `${day}-${month}-${year.slice(-2)}`;
  }

  return `${ville}_${objet}_${formattedDate}.${fileExtension}`;
}

function triggerDownload(blob, filename) {
  _fallbackDownload(blob, filename);
}

function _fallbackDownload(blob, filename) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
}

function renderPreview() {
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  photos.forEach(function (photo, i) {
    const card = document.createElement('div');
    card.className = 'photo-card';
    const img = document.createElement('img');
    img.src = photo.dataUrl;
    const meta = document.createElement('div');
    meta.className = 'photo-meta';
    const timeRow = document.createElement('div');
    timeRow.className = 'meta-row';
    timeRow.innerHTML = '🕒 ' + formatDate(photo.timestamp);
    const gpsRow = document.createElement('div');
    gpsRow.className = 'meta-row';
    gpsRow.innerHTML = photo.lat != null
      ? '📍 ' + photo.lat.toFixed(6) + ', ' + photo.lng.toFixed(6)
      : '📍 GPS non disponible';
    meta.appendChild(timeRow);
    meta.appendChild(gpsRow);
    const btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.className = 'btn-delete';
    btnDel.textContent = '✕ Supprimer';
    btnDel.onclick = () => deletePhoto(i);
    card.appendChild(img);
    card.appendChild(meta);
    card.appendChild(btnDel);
    preview.appendChild(card);
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getDetectedCity() {
  const adresse = v('adresse') || '';
  const parts = adresse.split(',');
  if (parts.length > 0) {
    const lastPart = parts[parts.length - 1].trim();
    const cityMatch = lastPart.match(/\d+\s+(.+)/) || [, lastPart];
    return cityMatch[1] || lastPart;
  }
  return '';
}

function getVille() {
  const selectVille = document.getElementById('ville');
  if (!selectVille) return '';
  const selected = selectVille.options[selectVille.selectedIndex];
  if (!selected) return '';
  return selected.value.trim();
}

function setVilleInSelect(cityName) {
  const selectVille = document.getElementById('ville');
  if (!cityName) return;
  const existing = selectVille.querySelector('option[data-auto]');
  if (existing) existing.remove();
  const options = Array.from(selectVille.options);
  const match = options.find(opt =>
    opt.value.trim().toLowerCase() === cityName.trim().toLowerCase() ||
    opt.text.trim().toLowerCase() === cityName.trim().toLowerCase()
  );
  if (match) {
    selectVille.value = match.value;
  } else {
    const tempOption = document.createElement('option');
    tempOption.value = cityName;
    tempOption.textContent = cityName + ' (détectée)';
    tempOption.setAttribute('data-auto', '1');
    const firstReal = selectVille.options[0];
    if (firstReal) { selectVille.insertBefore(tempOption, firstReal.nextSibling); }
    else { selectVille.appendChild(tempOption); }
    selectVille.value = cityName;
  }
}

function syncCityField() {
  const detectedCity = getDetectedCity();
  if (!detectedCity) return;
  setVilleInSelect(detectedCity);
}

function exportPDF() {
  const pdf = new jspdf.jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 15;
  const tableX = margin;
  const tableW = pageW - margin * 2;
  const colLabelW = 55;
  const colValueW = tableW - colLabelW;
  const lineH = 6;
  let y = margin;

  pdf.setDrawColor(0);
  pdf.setLineWidth(0.8);

  pdf.rect(tableX, y, tableW, 10);
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(12);
  pdf.text('INTERVENTION SOUS ASTREINTE', tableX + tableW / 2, y + 7, { align: 'center' });
  y += 10;

  let villeValue = getVille();
  if (!villeValue) { villeValue = getDetectedCity(); }

  const dateInput = v('date');
  const formattedDate = formatDateForPDF(dateInput);

  const rows = [
    ['VILLE', villeValue],
    ['ADRESSE', v('adresse')],
    ["Agent d'astreinte", v('agentAstreinte')],
    ["Date d'intervention", formattedDate],
    ["Heure d'appel", v('heureDebut')],
    ["Origine de l'appel", v('origine')],
    ["Heure de Fin d'intervention", v('heureFin')],
    ["Objet de l'intervention", v('objet')],
    ["Nature de l'intervention", v('nature')],
    ["Autres personnes appelées", v('autres')]
  ];

  rows.forEach(([label, value]) => {
    value = value || '';
    pdf.setFontSize(10);
    pdf.setFont('helvetica', 'bolditalic');
    const lLines = pdf.splitTextToSize(label, colLabelW - 4);
    pdf.setFont('helvetica', 'normal');
    const vLines = pdf.splitTextToSize(value, colValueW - 4);
    const rowH = Math.max(lLines.length, vLines.length) * lineH + 8;
    pdf.rect(tableX, y, colLabelW, rowH);
    pdf.rect(tableX + colLabelW, y, colValueW, rowH);
    const blockLabelH = lLines.length * lineH;
    const blockValueH = vLines.length * lineH;
    const labelStartY = y + (rowH - blockLabelH) / 2 + lineH / 2;
    const valueStartY = y + (rowH - blockValueH) / 2 + lineH / 2;
    pdf.setFont('helvetica', 'bolditalic');
    lLines.forEach((line, i) => { pdf.text(line, tableX + 2, labelStartY + i * lineH, { align: 'left', baseline: 'middle' }); });
    pdf.setFont('helvetica', 'normal');
    vLines.forEach((line, i) => { pdf.text(line, tableX + colLabelW + 2, valueStartY + i * lineH, { align: 'left', baseline: 'middle' }); });
    y += rowH;
  });

  if (photos.length > 0) {
    pdf.addPage();
    y = margin;
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(11);
    pdf.text('PHOTOGRAPHIES', margin, y);
    y += 8;
    photos.forEach((ph, index) => {
      const blockH = 75;
      const imgW = 60;
      const imgH = 45;
      if (y + blockH > pageH - margin) { pdf.addPage(); y = margin; }
      pdf.setLineWidth(0.6);
      pdf.rect(margin, y, pageW - margin * 2, blockH);
      pdf.setLineWidth(0.4);
      pdf.rect(margin, y, pageW - margin * 2, 8);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(10);
      pdf.text(`PHOTO N° ${index + 1}`, margin + 2, y + 6);
      const imgY = y + 12;
      try { pdf.addImage(ph.base64Compressed || ph.dataUrl, 'JPEG', margin + 3, imgY, imgW, imgH); } catch (e) { }
      const metaX = margin + imgW + 8;
      let metaY = imgY + 5;
      pdf.setFont('helvetica', 'bolditalic');
      pdf.setFontSize(9);
      pdf.text('Date / heure :', metaX, metaY);
      pdf.setFont('helvetica', 'normal');
      pdf.text(formatDate(ph.timestamp), metaX + 30, metaY);
      metaY += 8;
      pdf.setFont('helvetica', 'bolditalic');
      pdf.text('Localisation GPS :', metaX, metaY);
      pdf.setFont('helvetica', 'normal');
      pdf.text(ph.lat != null ? `${ph.lat.toFixed(6)}, ${ph.lng.toFixed(6)}` : 'Non disponible', metaX + 30, metaY);
      y += blockH + 6;
    });
  }

  triggerDownload(pdf.output('blob'), generateFileName('pdf'));
}

// ── Sauvegarde locale (IndexedDB) ──────────────────────────────────

async function saveDraftIndexedDB(draft) {
  try {
    const db = await getDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const request = store.put(draft);
      tx.oncomplete = () => { resolve(); };
      tx.onerror = () => { reject(tx.error); };
      request.onerror = () => { reject(request.error); };
    });
  } catch (e) { console.error('IndexedDB save error:', e); throw e; }
}

async function autoSaveDraftIfNeeded() {
  // 🚫 AUTOSAVE DÉSACTIVÉ — pour préserver la mémoire du téléphone
  return null;
}

// ──────────────────────────────────────────────────────────────────
// ✅ GÉNÉRATION DE L'ID DE SAUVEGARDE — Règle : VILLE_JJ-MM-AA_hh-mm
// ──────────────────────────────────────────────────────────────────
function generateDraftId() {
  const ville = (getVille() || 'VILLE').toUpperCase().replace(/\s+/g, '-');
  const now = new Date();
  const jj  = String(now.getDate()).padStart(2, '0');
  const mm  = String(now.getMonth() + 1).padStart(2, '0');
  const aa  = String(now.getFullYear()).slice(-2);
  const hh  = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  return `${ville}_${jj}-${mm}-${aa}_${hh}-${min}`;
}

async function saveDraft() {
  const ville = getVille() || 'VILLE';
  const now = new Date();
  const isUpdate = !!currentDraftId;
  const id = currentDraftId || generateDraftId();

  const photosToSave = photos.map(p => ({
    base64: p.base64Compressed, timestamp: p.timestamp, lat: p.lat, lng: p.lng
  }));

  const draft = {
    id,
    savedAt: now.toISOString(),
    ville,
    form: {
      ville: getVille(), adresse: v('adresse'), agentAstreinte: v('agentAstreinte'),
      date: v('date'), heureDebut: v('heureDebut'), origine: v('origine'),
      heureFin: v('heureFin'), objet: v('objet'), nature: v('nature'), autres: v('autres')
    },
    photos: photosToSave
  };

  try {
    await saveDraftIndexedDB(draft);
    currentDraftId = id;
    updateStatusBar();
    alert((isUpdate ? 'Brouillon mis à jour ✅' : 'Brouillon sauvegardé ✅') + '\n\nID : ' + id);
  } catch (e) {
    alert('❌ Erreur lors de la sauvegarde : ' + e.message);
    console.error('saveDraft échec :', e);
  }
}

async function loadDraftIndexedDB(id) {
  try {
    const db = await getDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(id);
      request.onsuccess = () => { resolve(request.result); };
      request.onerror = () => { reject(request.error); };
    });
  } catch (e) { console.error('IndexedDB load error:', e); throw e; }
}

async function getAllDraftsIndexedDB() {
  try {
    const db = await getDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onsuccess = () => { resolve(request.result); };
      request.onerror = () => { reject(request.error); };
    });
  } catch (e) { console.error('IndexedDB getAll error:', e); throw e; }
}

async function loadDraft() {
  try {
    const drafts = await getAllDraftsIndexedDB();
    if (drafts.length === 0) { alert('Aucune sauvegarde trouvée.'); return; }
    const choice = prompt(
      'Saisissez le numéro de la sauvegarde à charger :\n\n' +
      drafts.map((d, i) => `${i + 1} – ${d.id}`).join('\n')
    );
    const i = parseInt(choice, 10) - 1;
    if (isNaN(i) || !drafts[i]) return;
    const draft = drafts[i];
    for (const k in draft.form) {
      if (k === 'ville') continue;
      const el = document.getElementById(k);
      if (el) el.value = draft.form[k];
    }
    if (draft.form.ville) { setVilleInSelect(draft.form.ville); }
    photos = (draft.photos || []).map(p => ({
      base64Compressed: p.base64, dataUrl: p.base64,
      timestamp: new Date(p.timestamp), lat: p.lat, lng: p.lng, file: null
    }));
    renderPreview();
    currentDraftId = draft.id;
    updateStatusBar();
    alert('Brouillon chargé ✅');
  } catch (e) { alert('❌ Erreur lors du chargement : ' + e.message); console.error(e); }
}

function importDraft() { document.getElementById('importFile').click(); }

document.getElementById('importFile').addEventListener('change', function (e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const draft = JSON.parse(reader.result);
      const id = draft.id || ('import_' + Date.now());
      draft.id = id;
      await saveDraftIndexedDB(draft);
      for (const key in draft.form) {
        if (key === 'ville') continue;
        const el = document.getElementById(key);
        if (el) el.value = draft.form[key];
      }
      if (draft.form.ville) { setVilleInSelect(draft.form.ville); }
      photos = (draft.photos || []).map(p => ({
        base64Compressed: p.base64, dataUrl: p.base64,
        timestamp: new Date(p.timestamp), lat: p.lat, lng: p.lng, file: null
      }));
      renderPreview();
      currentDraftId = id;
      updateStatusBar();
      alert('Sauvegarde importée et ouverte ✅');
    } catch (err) { alert('Fichier de sauvegarde invalide.'); console.error(err); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

async function deleteDraft() {
  try {
    const drafts = await getAllDraftsIndexedDB();
    if (drafts.length === 0) { alert('Aucune sauvegarde à supprimer.'); return; }
    const choice = prompt(
      'Saisissez le numéro de la sauvegarde à SUPPRIMER :\n\n' +
      drafts.map((d, i) => `${i + 1} – ${d.id}`).join('\n')
    );
    const i = parseInt(choice, 10) - 1;
    if (isNaN(i) || !drafts[i]) return;
    const id = drafts[i].id;
    const ok = confirm('Voulez-vous vraiment supprimer cette sauvegarde ?\n\n' + id);
    if (!ok) return;
    const db = await getDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.delete(id);
      tx.oncomplete = () => { alert('Sauvegarde supprimée ✅'); resolve(); };
    });
  } catch (e) { alert('❌ Erreur lors de la suppression : ' + e.message); console.error(e); }
}

function buildAgentEmail(agent) {
  if (!agent) return '';
  return agent.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, '.') + '@seineouest.fr';
}

// ── Dictée vocale ──────────────────────────────────────────────────

function startDictation(fieldId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert("La dictée vocale n'est pas supportée sur ce navigateur.\nUtilisez Chrome ou Safari, ou dictez via le clavier de votre appareil.");
    return;
  }
  const field = document.getElementById(fieldId);
  if (!field) return;
  const recog = new SpeechRecognition();
  recog.lang = 'fr-FR';
  recog.interimResults = false;
  recog.maxAlternatives = 1;
  const btn = document.querySelector('button[onclick^="startDictation"]');
  if (btn) { btn.textContent = '🔴 Écoute…'; btn.disabled = true; }
  recog.onresult = function (e) {
    const transcript = e.results[0][0].transcript;
    field.value = field.value ? field.value.trimEnd() + ' ' + transcript : transcript;
  };
  recog.onerror = function (e) {
    const messages = {
      'not-allowed': "Accès au microphone refusé. Autorisez-le dans les paramètres du navigateur.",
      'no-speech': "Aucune parole détectée. Réessayez.",
      'network': "Erreur réseau lors de la dictée. Vérifiez votre connexion.",
      'aborted': "Dictée interrompue."
    };
    alert(messages[e.error] || 'Erreur dictée : ' + e.error);
  };
  recog.onend = function () {
    if (btn) { btn.textContent = '🎤 Dicter'; btn.disabled = false; }
  };
  recog.start();
}

async function checkLastDraft() {
  let drafts;
  try { drafts = await getAllDraftsIndexedDB(); } catch (e) { return; }
  if (!drafts || drafts.length === 0) return;

  drafts.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
  const last = drafts[0];

  const savedAt = last.savedAt
    ? new Intl.DateTimeFormat('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(new Date(last.savedAt))
    : '?';

  const resume = confirm(
    'Un brouillon a été trouvé :\n\n' +
    '📋 ' + last.id + '\n' +
    '🕒 Sauvegardé le ' + savedAt + '\n\n' +
    'Voulez-vous le reprendre ?\n(Annuler = nouvelle intervention)'
  );
  if (!resume) return;

  const draft = last;
  for (const k in draft.form) {
    if (k === 'ville') continue;
    const el = document.getElementById(k);
    if (el) el.value = draft.form[k];
  }
  if (draft.form.ville) { setVilleInSelect(draft.form.ville); }
  photos = (draft.photos || []).map(p => ({
    base64Compressed: p.base64, dataUrl: p.base64,
    timestamp: new Date(p.timestamp), lat: p.lat, lng: p.lng, file: null
  }));
  renderPreview();
  currentDraftId = draft.id;
  updateStatusBar();
}

document.addEventListener('DOMContentLoaded', () => {
  const isAndroid = /Android/i.test(navigator.userAgent);
  const micButton = document.querySelector('button[onclick^="startDictation"]');
  if (isAndroid && micButton) {
    micButton.disabled = true;
    micButton.textContent = "🎤 Dictée via clavier";
    micButton.title = "Utilisez le micro du clavier Android pour dicter le texte";
  }
  initIndexedDB()
    .then(() => checkLastDraft())
    .catch(e => { console.error('Failed to initialize IndexedDB:', e); });
  const adresseField = document.getElementById('adresse');
  if (adresseField) {
    adresseField.addEventListener('input',  syncCityField);
    adresseField.addEventListener('change', syncCityField);
  }
});
